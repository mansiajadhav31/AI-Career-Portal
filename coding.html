<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Practice - AI Career Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .difficulty-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
        }
        .filter-btn.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }
        .question-item {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .question-item:hover {
            background: #f8f9ff;
        }
        .difficulty-easy { color: #22c55e; }
        .difficulty-medium { color: #f59e0b; }
        .difficulty-hard { color: #ef4444; }
        .code-editor {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }
        .code-editor-header {
            background: #2d2d2d;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
        }
        #codeEditor {
            width: 100%;
            min-height: 300px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 12px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            outline: none;
        }
        .output-area {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="logo">🚀 AI Career Portal</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="interview.html">Mock Interview</a>
                <a href="coding.html">Coding Practice</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>💻 Coding Practice</h1>
        <p>Solve coding challenges and improve your programming skills</p>

        <div class="dashboard-grid" style="grid-template-columns: 350px 1fr;">
            <!-- Question List -->
            <div class="card">
                <h3>Questions</h3>
                <div class="difficulty-filter">
                    <button class="filter-btn active" onclick="filterQuestions('all')">All</button>
                    <button class="filter-btn" onclick="filterQuestions('easy')">Easy</button>
                    <button class="filter-btn" onclick="filterQuestions('medium')">Medium</button>
                    <button class="filter-btn" onclick="filterQuestions('hard')">Hard</button>
                </div>
                <div id="questionsList"></div>
            </div>

            <!-- Code Editor -->
            <div class="card">
                <div id="questionDetails">
                    <p style="color: #666;">Select a question from the left to start coding!</p>
                </div>
                
                <div class="form-group">
                    <label>Language</label>
                    <select id="language" onchange="updateStarterCode()">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                    </select>
                </div>
                
                <div class="code-editor">
                    <div class="code-editor-header">Code Editor</div>
                    <textarea id="codeEditor" placeholder="Write your code here..."></textarea>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button class="btn btn-primary" onclick="runCode()">▶ Run Code</button>
                    <button class="btn btn-secondary" onclick="submitCode()">Submit Solution</button>
                </div>
                
                <div id="codeOutput" class="output-area">
                    Output will appear here...
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
